<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freedoom</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #dos {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="dos"></div>

  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  <script>
    window.addEventListener("load", async () => {
      try {
        const dos = await Dos(document.getElementById("dos"), {
          url: "./assets/doom/freedoom.jsdos",
          kiosk: true,
          theme: "dark"
        });

        console.log("js-dos iniciado:", dos);
      } catch (error) {
        console.error("Erro ao iniciar DOOM:", error);
      }
    });
  </script>
</body>
</html>
