<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOOM</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #game {
      width: 100%;
      height: 100%;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: Arial, sans-serif;
      background: #000;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div class="loading" id="loading">Carregando DOOM...</div>

  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  <script>
    window.addEventListener("load", async () => {
      try {
        const ci = await Dos(document.getElementById("game"), {
          url: "./assets/doom/doom.jsdos",
          kiosk: true
        });

        console.log("js-dos carregado:", ci);
        document.getElementById("loading").style.display = "none";
      } catch (err) {
        console.error("Erro ao iniciar DOOM:", err);
        document.getElementById("loading").textContent = "Erro ao carregar o jogo";
      }
    });
  </script>
</body>
</html>
