<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freedoom</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #dos {
      width: 100%;
      height: 100%;
    }

    .loading {
      position: absolute;
      color: #00ff00;
      font-family: monospace;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="dos"></div>
  <div class="loading" id="loading">Carregando DOOM...</div>

  <!-- js-dos via CDN (mais confiável) -->
  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>

  <script>
    window.addEventListener("load", () => {
      const container = document.getElementById("dos");

      Dos(container, {
        url: "./assets/doom/freedoom.jsdos", // caminho relativo correto
        autoStart: true,
        kiosk: true
      }).then(() => {
        document.getElementById("loading").style.display = "none";
      }).catch(err => {
        console.error("Erro ao carregar DOOM:", err);
        document.getElementById("loading").innerText = "Erro ao carregar 😢";
      });
    });
  </script>
</body>
</html>
