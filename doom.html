<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOOM</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .wrap {
      width: 100%;
      height: 100%;
      position: relative;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .hint {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font: 12px/1.2 Arial, sans-serif;
      padding: 8px 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <iframe
      id="doomFrame"
      src="https://dos.zone/player/?bundleUrl=https://cdn.dos.zone/custom/dos/doom.jsdos?anonymous=1"
      allowfullscreen
      loading="eager"
      referrerpolicy="no-referrer"
      title="DOOM"
    ></iframe>

    <div class="hint">Clique no jogo para ativar o teclado</div>
  </div>

  <script>
    const iframe = document.getElementById("doomFrame");

    window.addEventListener("load", () => {
      setTimeout(() => iframe.focus(), 800);
    });

    iframe.addEventListener("load", () => {
      setTimeout(() => iframe.focus(), 500);
    });
  </script>
</body>
</html>
