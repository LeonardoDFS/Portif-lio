<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>DOOM</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #game {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #game canvas,
    #game .js-dos,
    #game .js-dos-canvas {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div class="loading" id="loading">Carregando DOOM...</div>

  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  <script>
    window.addEventListener("load", async () => {
      try {
        const ci = await Dos(document.getElementById("game"), {
          url: "./assets/doom/doom.jsdos",
          kiosk: true,
          scale: 1,
        });

        console.log("js-dos carregado:", ci);
        document.getElementById("loading").style.display = "none";
      } catch (err) {
        console.error("Erro ao iniciar DOOM:", err);
        document.getElementById("loading").textContent = "Erro ao carregar o jogo";
      }
    });
  </script>
</body>
</html>
