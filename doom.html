<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOOM</title>
  <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
      #dos {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* ADICIONAR ISSO AQUI */
      #dos canvas,
      #dos .js-dos,
      #dos .js-dos-canvas {
        width: 100% !important;
        height: 100% !important;
        object-fit: contain;
      }
    </style>
</head>
<body>
  <div id="game"></div>
  <div class="loading" id="loading">Carregando DOOM...</div>

  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  <script>
    window.addEventListener("load", async () => {
      try {
        const ci = await Dos(document.getElementById("game"), {
          url: "./assets/doom/doom.jsdos",
          kiosk: true
        });

        console.log("js-dos carregado:", ci);
        document.getElementById("loading").style.display = "none";
      } catch (err) {
        console.error("Erro ao iniciar DOOM:", err);
        document.getElementById("loading").textContent = "Erro ao carregar o jogo";
      }
    });
  </script>
</body>
</html>
